<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal · Earning Mastery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f42 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 2rem;
            box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 440px;
            padding: 2.5rem 2rem;
        }

        .brand {
            text-align: center;
            margin-bottom: 2.2rem;
        }

        .brand h1 {
            color: white;
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 0.3rem;
        }

        .brand p {
            color: #99b8d9;
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.8;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #d0e2ff;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.6rem;
            opacity: 0.8;
        }

        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            color: white;
            font-weight: 400;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(0, 0, 0, 0.35);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .input-field::placeholder {
            color: rgba(170, 200, 240, 0.4);
            font-weight: 300;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 1.5rem;
            padding: 1rem 1.5rem;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 25px -8px #1e3a8a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -10px #1e3a8a;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .alert-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 1rem;
            padding: 0.8rem 1.2rem;
            color: #fecaca;
            font-size: 0.9rem;
            margin: 1.5rem 0 0.5rem;
            display: none;
            align-items: center;
            gap: 0.6rem;
            backdrop-filter: blur(4px);
        }

        .alert-message.show {
            display: flex;
        }

        .footer-links {
            text-align: center;
            margin-top: 2rem;
        }

        .footer-links a {
            color: #84a9d2;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            border-bottom: 1px dashed transparent;
        }

        .footer-links a:hover {
            color: white;
            border-bottom-color: #5f9ea0;
        }

        .eye-icon {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #a0c0e0;
            cursor: pointer;
            font-size: 1.2rem;
            user-select: none;
        }

        .password-wrapper {
            position: relative;
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glass-panel">
        <div class="brand">
            <h1>🔐 Earning Mastery</h1>
            <p>administrator access only</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" class="input-field" id="username" placeholder="e.g. admin" autocomplete="off" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" class="input-field" id="password" placeholder="··········" required>
                    <span class="eye-icon" id="togglePassword">👁️</span>
                </div>
            </div>

            <button type="submit" class="login-btn">→ Enter Dashboard</button>

            <div class="alert-message" id="errorMessage">
                <span>⛔</span> <span id="errorText">Invalid credentials</span>
            </div>
        </form>

        <div class="footer-links">
            <a href="index.html">← return to main site</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0/dist/iife/sdk.min.js"></script>
    <script>
        // Appwrite config
        const APP = {
            endpoint: 'https://fra.cloud.appwrite.io/v1',
            projectId: '69a1fbfc003d9ff7c2d6',
            databaseId: '69a1fc36002e16fa4035',
            collectionId: 'admin_table',
            documentId: '69a1fdc3002727c383e7',
            usernameField: 'Username_aug',
            passwordField: 'Password_aug'
        };

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
            this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
        });

        // Login handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            try {
                const client = new Appwrite.Client();
                const databases = new Appwrite.Databases(client);
                
                client
                    .setEndpoint(APP.endpoint)
                    .setProject(APP.projectId)
                    .setSelfSigned(true)
                    .setMode('admin');

                const response = await databases.getDocument(
                    APP.databaseId,
                    APP.collectionId,
                    APP.documentId
                );

                if (response[APP.usernameField] === username && response[APP.passwordField] === password) {
                    // Store minimal session
                    sessionStorage.setItem('adminAuth', 'true');
                    sessionStorage.setItem('adminUser', username);
                    
                    // Redirect to dashboard
                    window.location.href = 'Dashboard.html';
                } else {
                    errorText.textContent = 'incorrect username or password';
                    errorDiv.classList.add('show');
                    
                    // Shake effect
                    document.getElementById('loginForm').style.animation = 'shake 0.4s ease';
                    setTimeout(() => document.getElementById('loginForm').style.animation = '', 400);
                }

            } catch (err) {
                console.error('Login error:', err);
                errorText.textContent = 'connection error — check network or config';
                errorDiv.classList.add('show');
            }
        });

        // Add shake keyframe
        const style = document.createElement('style');
        style.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                20% { transform: translateX(-8px); }
                40% { transform: translateX(8px); }
                60% { transform: translateX(-4px); }
                80% { transform: translateX(4px); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
  </html>
