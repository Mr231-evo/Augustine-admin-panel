<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal · Earning Mastery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b1a2e 0%, #1a2f42 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 2rem;
            width: 100%;
            max-width: 440px;
            padding: 2.5rem 2rem;
            color: white;
        }
        .brand { text-align: center; margin-bottom: 2.2rem; }
        .input-group { margin-bottom: 1.5rem; }
        .input-group label { display: block; font-size: 0.85rem; margin-bottom: 0.6rem; opacity: 0.8; }
        .input-field {
            width: 100%;
            background: rgba(0, 0, 0, 0.25);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            color: white;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            border: none;
            border-radius: 1.5rem;
            padding: 1rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .alert-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-top: 1rem;
            display: none;
            font-size: 0.9rem;
        }
        .alert-message.show { display: block; }
        .password-wrapper { position: relative; }
        .eye-icon { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); cursor: pointer; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body>
    <div class="glass-panel">
        <div class="brand">
            <h1>🔐 Admin Access</h1>
            <p>Earning Mastery Portal</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" class="input-field" id="username" placeholder="Admin username" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" class="input-field" id="password" placeholder="••••••••" required>
                    <span class="eye-icon" id="togglePassword">👁️</span>
                </div>
            </div>

            <button type="submit" class="login-btn">Enter Dashboard</button>

            <div class="alert-message" id="errorMessage">
                <span>⛔</span> <span id="errorText">Invalid credentials</span>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0/dist/iife/sdk.min.js"></script>
    
    <script>
        const APP = {
            endpoint: 'https://fra.cloud.appwrite.io/v1',
            projectId: '69a1fbfc003d9ff7c2d6',
            databaseId: '69a1fc36002e16fa4035',
            collectionId: 'admin_table',
            usernameField: 'Username_aug',
            passwordField: 'Password_aug'
        };

        // Initialize Client
        const client = new Appwrite.Client()
            .setEndpoint(APP.endpoint)
            .setProject(APP.projectId);

        const databases = new Appwrite.Databases(client);

        // Toggle Password
        document.getElementById('togglePassword').addEventListener('click', function() {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        });

        // Login Logic
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userVal = document.getElementById('username').value.trim();
            const passVal = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');

            errorDiv.classList.remove('show');

            try {
                // Search for the document where the Username attribute matches
                const response = await databases.listDocuments(
                    APP.databaseId,
                    APP.collectionId,
                    [
                        Appwrite.Query.equal(APP.usernameField, userVal)
                    ]
                );

                if (response.documents.length > 0) {
                    const adminDoc = response.documents[0];
                    
                    // Check if password matches the column in that document
                    if (adminDoc[APP.passwordField] === passVal) {
                        sessionStorage.setItem('adminAuth', 'true');
                        sessionStorage.setItem('adminUser', userVal);
                        window.location.href = 'Dashboard.html';
                    } else {
                        throw new Error('Incorrect password');
                    }
                } else {
                    throw new Error('User not found');
                }

            } catch (err) {
                console.error(err);
                errorText.textContent = err.message || 'Login failed';
                errorDiv.classList.add('show');
                document.getElementById('loginForm').style.animation = 'shake 0.3s ease';
                setTimeout(() => document.getElementById('loginForm').style.animation = '', 300);
            }
        });
    </script>
</body>
</html>
